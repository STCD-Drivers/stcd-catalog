name: Refresh SmartThings Token

on:
  workflow_dispatch:

  schedule:
    # diariamente às 03:00 UTC
    #- cron: "0 3 * * *"
    - cron: "*/5 * * * *"

jobs:
  refresh:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          python3 -m pip install pynacl

      #######################################################################
      # REFRESH SMARTTHINGS TOKENS
      #######################################################################

      - name: Refresh SmartThings token
        env:
          ST_REFRESH_TOKEN: ${{ secrets.ST_REFRESH_TOKEN }}
          ST_CLIENT_ID: ${{ vars.ST_CLIENT_ID }}
        run: |

          set -euo pipefail

          RESPONSE_FILE=response.json

          HTTP_STATUS=$(curl \
            --silent \
            --show-error \
            --output "$RESPONSE_FILE" \
            --write-out "%{http_code}" \
            --request POST \
            "https://auth-global.api.smartthings.com/oauth/token" \
            --header "Content-Type: application/x-www-form-urlencoded" \
            --data "grant_type=refresh_token" \
            --data "client_id=$ST_CLIENT_ID" \
            --data "refresh_token=$ST_REFRESH_TOKEN")

          echo "HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "SmartThings token refresh failed."
            rm -f "$RESPONSE_FILE"
            exit 1
          fi

          ACCESS_TOKEN=$(jq -r '.access_token // empty' "$RESPONSE_FILE")
          REFRESH_TOKEN=$(jq -r '.refresh_token // empty' "$RESPONSE_FILE")

          if [ -z "$ACCESS_TOKEN" ]; then
            echo "Response does not contain access_token."
            rm -f "$RESPONSE_FILE"
            exit 1
          fi

          if [ -z "$REFRESH_TOKEN" ]; then
            echo "Response does not contain refresh_token."
            rm -f "$RESPONSE_FILE"
            exit 1
          fi

          echo "::add-mask::$ACCESS_TOKEN"
          echo "::add-mask::$REFRESH_TOKEN"

          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> "$GITHUB_ENV"
          echo "REFRESH_TOKEN=$REFRESH_TOKEN" >> "$GITHUB_ENV"

          rm -f "$RESPONSE_FILE"

      #######################################################################
      # GET REPOSITORY PUBLIC KEY
      #######################################################################

      - name: Get repository public key
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
        run: |

          set -euo pipefail

          curl \
            --silent \
            --show-error \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/secrets/public-key" \
            > github-key.json

          KEY_ID=$(jq -r '.key_id // empty' github-key.json)
          PUBLIC_KEY=$(jq -r '.key // empty' github-key.json)

          if [ -z "$KEY_ID" ] || [ -z "$PUBLIC_KEY" ]; then
            echo "Unable to obtain repository public key."
            rm -f github-key.json
            exit 1
          fi

          echo "KEY_ID=$KEY_ID" >> "$GITHUB_ENV"
          echo "PUBLIC_KEY=$PUBLIC_KEY" >> "$GITHUB_ENV"

          rm -f github-key.json

      #######################################################################
      # UPDATE ST_ACCESS_TOKEN
      #######################################################################

      - name: Encrypt ST_ACCESS_TOKEN
        run: |

          set -euo pipefail

          python3 << 'EOF'
          import os
          import json
          import base64
          from nacl import public, encoding

          public_key = public.PublicKey(
              os.environ["PUBLIC_KEY"].encode(),
              encoding.Base64Encoder()
          )

          encrypted = public.SealedBox(public_key).encrypt(
              os.environ["ACCESS_TOKEN"].encode()
          )

          payload = {
              "encrypted_value": base64.b64encode(encrypted).decode(),
              "key_id": os.environ["KEY_ID"]
          }

          with open("access-secret.json", "w") as f:
              json.dump(payload, f)
          EOF

      - name: Update ST_ACCESS_TOKEN
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
        run: |

          set -euo pipefail

          HTTP_STATUS=$(curl \
            --silent \
            --show-error \
            --output /dev/null \
            --write-out "%{http_code}" \
            --request PUT \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/secrets/ST_ACCESS_TOKEN" \
            --data @access-secret.json)

          rm -f access-secret.json

          if [ "$HTTP_STATUS" != "201" ] && [ "$HTTP_STATUS" != "204" ]; then
            echo "Failed updating ST_ACCESS_TOKEN."
            exit 1
          fi

      #######################################################################
      # UPDATE ST_REFRESH_TOKEN
      #######################################################################

      - name: Encrypt ST_REFRESH_TOKEN
        run: |

          set -euo pipefail

          python3 << 'EOF'
          import os
          import json
          import base64
          from nacl import public, encoding

          public_key = public.PublicKey(
              os.environ["PUBLIC_KEY"].encode(),
              encoding.Base64Encoder()
          )

          encrypted = public.SealedBox(public_key).encrypt(
              os.environ["REFRESH_TOKEN"].encode()
          )

          payload = {
              "encrypted_value": base64.b64encode(encrypted).decode(),
              "key_id": os.environ["KEY_ID"]
          }

          with open("refresh-secret.json", "w") as f:
              json.dump(payload, f)
          EOF

      - name: Update ST_REFRESH_TOKEN
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
        run: |

          set -euo pipefail

          HTTP_STATUS=$(curl \
            --silent \
            --show-error \
            --output /dev/null \
            --write-out "%{http_code}" \
            --request PUT \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/secrets/ST_REFRESH_TOKEN" \
            --data @refresh-secret.json)

          rm -f refresh-secret.json

          if [ "$HTTP_STATUS" != "201" ] && [ "$HTTP_STATUS" != "204" ]; then
            echo "Failed updating ST_REFRESH_TOKEN."
            exit 1
          fi

      #######################################################################
      # SUCCESS
      #######################################################################

      - name: Success
        run: |
          echo "SmartThings tokens refreshed successfully."